name: bluechat
description: Offline Bluetooth messaging for nearby Android devices.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  intl: ^0.20.2
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  isar_community_generator: ^3.3.2

flutter:
  uses-material-design: true

